---
- name: Deploy da página via template
  template:
    src: index.php.j2
    dest: "{{ web_root }}/index.php"
    owner: www-data
    group: www-data
    mode: "0644"
  notify: Reiniciar Apache

- name: Permissões do web root após deploy
  file:
    path: "{{ web_root }}"
    owner: www-data
    group: www-data
    recurse: yes
